kind = "web"
previewPath = "/"
title = "Mourya Green World"
version = "1.0.0"
id = "artifacts/mourya-green-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24765

[services.development]
run = "pnpm --filter @workspace/mourya-green-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mourya-green-world", "run", "build" ]
publicDir = "artifacts/mourya-green-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24765"
BASE_PATH = "/"
